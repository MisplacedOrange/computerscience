<script language=javascript>
let names = ["Olivia", "Emma", "Mateo", "Samuel"];
let otherNames = ["William", "Jane"];
let allNames = names.concat(otherNames);

document.write("<br>" + names); // -> ["Olivia", "Emma", "Mateo", "Samuel"]
document.write("<br>" + otherNames); // -> ["William", "Jane"]
document.write("<br>" + allNames); 
// -> ["Olivia", "Emma", "Mateo", "Samuel", "William", "Jane"]


</script>
