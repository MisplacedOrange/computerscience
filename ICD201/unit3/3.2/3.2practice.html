<html>
<head>
    <title>ICD201 - Unit 3.2</title>
</head>
    <body>
        <script>
            var fname = prompt("Enter your first name:");
            var lname = prompt("Enter your last name:");
            var dob = prompt("Enter your date of birth:");
            
            // Question 1
            document.write("Question 1<br>");
            document.write(fname, "<br>");
            document.write(lname, "<br>");
            document.write(dob, "<br>");
            
            // Question 2
            document.write("Question 2<br>");
            document.write(fname, lname, dob, "<br>");
            
            // Question 3
            document.write("Question 3<br>");
            document.write(fname + "<br>" + lname + "<br>" + dob + "<br>");
            
            // Question 4
            document.write("Question 4<br>");
            document.write(fname + lname  + dob + "<br>");
            
            // Question 5
            document.write("Question 5<br>");
            document.write(fname + " " + lname + " " + dob);
            
    </script>
    </body>
</html>
