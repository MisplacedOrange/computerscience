<script>
//create an empty array
let arr = [];
let contLoop= true;

while(contLoop == true){
	
	let elem = prompt("Enter a colour");
	if (elem !=""){
		arr.push(elem); //append elem to end of arr
	}
	contLoop = confirm("Do you want to continue?");
	
}
//document.write(arr);
let len = arr.length;
for(let i =0; i<len;i++){
	document.write("<br>" + arr[i]);
}
</script>
