<html>
    <head>
        <title>3.1 - javascript</title>
    </head>
    <body>
        <script type="text/javascript">
            var sideStr, side, perimeter;
            sideStr = prompt("Enter the length of the side of the square in cm:");
            side = parseFloat(sideStr);
            perimeter = 4 * side;
            document.write("<b>Hello World!</b><br>");
            document.write("<h1><b>Hello World!</b></h1><br>");
            document.write("<h6><b>Hello World!</b></h6><br>");
            document.write("<h6><b>perimeter = " + perimeter + " cm</b></h6><br>");
        </script>
    </body>
</html>
