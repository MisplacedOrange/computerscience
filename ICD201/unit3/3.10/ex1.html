<script>
let nr = 0;  //->false
let year = -1970; //->true
let name = "Alice"; //->true
let empty = ""; //->false   ! means not
 
document.write("<br>" + !nr); // -> true
document.write("<br>" + !year); // -> false
document.write("<br>" + !name); // -> false
document.write("<br>" + !empty); // -> true
 
document.write("<br>" + !!nr); // -> false
document.write("<br>" + !!name); // -> true

</script>
