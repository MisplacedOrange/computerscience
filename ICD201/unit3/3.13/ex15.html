<html>
<head>
</head>
<body>
	<script>
		function display() {
			let result = "";

			let c1 = document.getElementById("r1");
			if (c1.checked) {
				result = c1.value;
				let c2 = document.getElementById("r2");
			} else if (c2.checked) {
				result = c2.value;
				let c3 = document.getElementById("r3");
			} else if (c3.checked) {
				result = c3.value;
			}
			
			let r = document.getElementById("text");
			r.innerHTML = result;
		}
	</script>
	<br>
	<label>Food</label>

	<br>
	<input type="radio" name="food" id="r1" value="chicken" />
	<label for="r1">Chicken</label>
	<br>
	<input type="radio" name="food" id="r2" value="beef" />
	<label for="r2">Beef</label>
	<br>
	<input type="radio" name="food" id="r3" value="pork" checked />
	<label for="r3">Pork</label>

	<br>
	<button type="button" onClick="display()">Button</button>
	<p id="text"></p>
</body>
</html>
