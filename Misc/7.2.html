<html>

<head>
    <title>JavaScript</title>
    <style>
        .hide {
            display: none;
        }
       
      .car {
           position:absolute;
           bottom:100px;
           left:100px;
           width:60px;
           height:80px;
           background-color:blue;
       
        } 
        
    </style>
</head>

<body>
    <div class="headScore">Score</div>
    
    <div class="game">
        <div class="startScreen"> - <b>Game Instruction:</b>
            <br> - Press here to Start
            <br> - Arrow keys to move
            <br> - If you hit a another car you will lose.
        </div>
        
        <div class="gameArea"> 
            <br>
        </div>
    </div>

   <footer class="footer">
     <br><br></>footer
   </footer> 
   
   <script>
        const score = document.querySelector(".headScore");
        const startScreen = document.querySelector(".startScreen");
        const gameArea = document.querySelector(".gameArea");
        
        startScreen.addEventListener("click", startGame);
        
        document.addEventListener("keydown", pressOn);
        document.addEventListener("keyup", pressOff);
        
        let player ={
                  start:false,  
                  speed:5 
                }
        
        let keys ={ArrowUp:false,
                     ArrowDown:false,
                     ArrowRight: false,
                     ArrowLeft: false
           }
      
        function pressOn(e){
        e.preventDefault();
            keys[e.key] = true;
            console.log(keys);   
    
        }
        
        function pressOff(e){
        	e.preventDefault();
            keys[e.key] = false;
           
    
        }     


       function playGame(){
          let car =document.querySelector(".car");
          
          if(player.start){
          
			   if(keys.ArrowUp){
				  player.y -=player.speed;
				}
			   if(keys.ArrowDown){
				player.y +=player.speed;
			   }
			   if(keys.ArrowLeft){
				 player.x -=player.speed;
			   }
			   if(keys.ArrowRight){
				 player.x +=player.speed;
			   }
			
			  car.style.left =player.x + 'px';
		      car.style.top =player.y + 'px';
			   
			  window.requestAnimationFrame(playGame);			  
			}         
        
        }      
      
      
        function startGame(){
           alert("start game is clicked !");
           console.log("start game is clicked !");    
           
		   player.start = true; 
      
           startScreen.classList.add('hide');              
         
           let car =document.createElement("DIV");
           car.innerText= "CAR";
           car.setAttribute("class", "car");

           gameArea.appendChild(car);    

		   player.x =car.offsetLeft;
		   player.y=car.offsetTop; 
           
           window.requestAnimationFrame(playGame);		
        }
        
              
    </script>
</body>

</html>
