<script type="text/javascript">
                 // 0 1   2    3
	let values = [10, 30, 50, 100]; // values[0] => 10, values[3] => 100
	let len = values.length;
	let sum =0;
	
	for (let i=0;i<len;i++){
		document.write("<br>"+ values[i]);
		sum = sum + values[i];
		//sum = 0 + 10 =10
		//sum = 10 + 30 = 40
		//sum = 40 + 50 = 90
		//sum = 90 + 100
	}
	
	document.write("<br> Total sum is "+ sum);
</script>
