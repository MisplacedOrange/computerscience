<script type="text/javascript">
    //Declare and intialize these variables
    let num1=0, num2=0, average = 0;

    //prompt the user for their inputs
    //parseFloat convert the input to float number
    let x1 = prompt("Enter a number");
    let x2 =prompt("Enter a number");
    num1 = parseFloat(x1);
    num2 = parseFloat(x2);

    average = (num1 + num2)  / 2;
    document.write ("<br>","The average is " + average);
</script>
