<html>

<head>
    <title>JavaScript</title>
    <style>
        .hide {
            display: none;
        }
       
      .car {
           position:absolute;
           bottom:100px;
           left:100px;
           width:50px;
           height:80px;
           background-color:blue;
       
        } 
        
      .score {
            background-color: black;
            height: 70px;
            text-align: center;
            color: white;
            font-size: 1.5em;
            font-family: fantasy;
        }
        
       .gameArea {        

			width:200px;
			height:80%;
			overflow:hidden;
			postion:relative;
			margin:auto;
		
        }


        
        .startScreen {
            position: absolute;
            background-color: red;
            left: 25%;
            top: 100px;
            color: white;
            z-index: 1;
            text-align: center;
            border: 1px solid red;
            padding: 15px;
            margin: auto;
            width: 50%;
            font-family: sans-serif;
        }
        
       .footer {
            background-color: black;
            height: 70px;
            text-align: center;
            color: white;
            font-size: 1.5em;
            font-family: fantasy;
        }
        
    </style>
</head>

<body>
    <div class="score">Score</div>
    
    <div class="game">
        <div class="startScreen"> - <b>Game Instruction:</b>
            <br> - Press here to Start
            <br> - Arrow keys to move
            <br> - If you hit a another car you will lose.
        </div>
        
        <div class="gameArea"> 
            <br>
        </div>
    </div>

   <footer class="footer">
     <br>footer
   </footer> 
   
   <script>
        const score = document.querySelector(".score");
        const startScreen = document.querySelector(".startScreen");
        const gameArea = document.querySelector(".gameArea");
        
        startScreen.addEventListener("click", startGame);
        
        document.addEventListener("keydown", pressOn);
        document.addEventListener("keyup", pressOff);
        
        let player ={speed:5 }
        
        let keys ={ArrowUp:false,
                     ArrowDown:false,
                     ArrowRight: false,
                     ArrowLeft: false
           }
      
       function playGame(){
          let car =document.querySelector(".car");
          
          if(player.start){
          
           if(keys.ArrowUp){player.y -=player.speed;}
           if(keys.ArrowDown){player.y +=player.speed;}
           if(keys.ArrowLeft){player.x -=player.speed;}
           if(keys.ArrowRight){player.x +=player.speed;}
           
		   car.style.left =player.x + 'px';
		   car.style.top =player.y + 'px';
           
           window.requestAnimationFrame(playGame);
          
          }         
        
        }      
      
      
        function startGame(){
           alert("start game is clicked !");
           console.log("start game is clicked !");           
           startScreen.classList.add('hide');   
           
           player.start = true;
           
           let car =document.createElement("DIV");
           car.innerText= "CAR";
           car.setAttribute("class", "car");
           gameArea.appendChild(car);       
           
           window.requestAnimationFrame(playGame);
		   
		   player.x =car.offsetLeft;
		   player.y=car.offsetTop;
          
      
        }
        
        function pressOn(e){
        	e.preventDefault();
            keys[e.key] = true;
            console.log(keys);   
    
        }
        
        function pressOff(e){
        	e.preventDefault();
            keys[e.key] = false;
           
    
        }
        
        
        
    </script>
</body>

</html>
