<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Example 2</title>
<script>
function display(){
	let msgObj = document.getElementById("view");
	
	document.getElementById("d").innerText = msgObj.value;
	
	let msg = msgObj.options[msgObj.selectedIndex].text;
	document.getElementById("d2").innerText = msg;
}
</script>
</head>
<body>
<select id="view">
<option value="Item_1">Item 1</option>
<option value="Item_2" selected>Item 2</option>
<option value="Item_3">Item 3</option>
</select>

<button onClick="display();">Display</button>
<p id="d"></p>
<p id="d2"></p>
</body>
