<script type="text/javascript">
let names = ["Olivia", "Emma", "Mateo", "Samuel"];
document.write("<br>" + names.length); // -> 4
 
let name = names.shift();
document.write("<br>" +names.length); // -> 3
document.write("<br>" +name); // -> Olivia
document.write("<br>" +names); // -> ["Emma", "Mateo", "Samuel"]
 /*
 unshift ==> add an item at the beginning of array
 shift ==> remove an item at the beginning of array
 */
 </script>
