       .gameArea {
            background-color: black;

            position: absolute;

<body>
    <div class="score">Player:______     Score:____ </div>
    
    <div class="game">
        <div class="startScreen"> - <b>Game Instruction:</b>
            <br> - Press here to Start
            <br> - Arrow keys to move
            <br> - If you hit a another car you will lose.
        </div>
        
        <div class="gameArea"> 
            <br>
        </div>
    </div>

   <footer class="footer">
     <br>footer
   </footer> 
   
   <script>
        const score = document.querySelector(".score");
        const startScreen = document.querySelector(".startScreen");
        const gameArea = document.querySelector(".gameArea");
        
        startScreen.addEventListener("click", startGame);
        
        document.addEventListener("keydown", pressOn);
        document.addEventListener("keyup", pressOff);
        
        let player ={speed:5 }

     
        
        let keys ={ArrowUp:false,
                     ArrowDown:false,
                     ArrowRight: false,
                     ArrowLeft: false
           }

        let key1s ={W:false,
                     S:false,
                     D: false,
                     A: false
        }
      
	   // checking tow objct collision
	   function checkCollision(a, b) {
            let aRect = a.getBoundingClientRect();
            let bRect = b.getBoundingClientRect();
            return !(
                (aRect.bottom < bRect.top) || (aRect.top > bRect.bottom) || (aRect.right < bRect.left) || (aRect.left > bRect.right))
        }
 
	  
	 
	    // moving lines function
	    function moveLines() {
            let lines = document.querySelectorAll(".line");
            lines.forEach(function (item) {
                if (item.y >= 1500) {
                    item.y -= 1500;
                }
                item.y += player.speed;
                item.style.top = item.y + "px";
            })
        }
		
		//reset game
		function resetGame() {
            player.start = false;
				// Refresh after 5 seconds (5000 ms)
			setTimeout(() => {
				location.reload();
			}, 1000);
            //startScreen.classList.remove("hide");		
			
        }
	
		 
	    // moving cars function
	    function moveCars(player) {
            let enemy = document.querySelectorAll(".enemy");
            enemy.forEach(function (item) {
			
				if (checkCollision(player, item)) {
                    console.log("HIT");
					alert("Game is Over, you lost !!");					
					resetGame();                    
                } 
			   let speed = Math.floor(Math.random() * (10)) + 3;
                if (item.y >= 1500) {
                    item.y -= 1500;
                }
                item.y += speed;
				// random speed 
                item.style.top = item.y + "px";
            })
        }


       function playGame(){
          let car =document.querySelector(".car");
		  
		  moveLines();
		  // move enemy down road
		  moveCars(car);
          
          if(player.start){
          
           if(keys.ArrowUp){player.y -=player.speed;}
           if(keys.ArrowDown){player.y +=player.speed;}
           if(keys.ArrowLeft){player.x -=player.speed;}
           if(keys.ArrowRight){player.x +=player.speed;}
           
		   car.style.left =player.x + 'px';
		   car.style.top =player.y + 'px';
           
           window.requestAnimationFrame(playGame);
          
          }         
        
        }           
      
      
        function startGame(){
           alert("start game is clicked !");
           console.log("start game is clicked !");           
           startScreen.classList.add('hide');   
		   // clear the game screen 
		   gameArea.innerHTML = "";
           
           player.start = true;

           
           let car =document.createElement("DIV");
           car.innerText= "Player";
           car.setAttribute("class", "car");
           gameArea.appendChild(car);       
		   
		   
     	   window.requestAnimationFrame(playGame);
		   player.x =car.offsetLeft;
		   player.y=car.offsetTop;
		   
		   
		   // add lines
		   for (let x = 0; x < 10; x++) {
                let line = document.createElement("div");
                line.classList.add("line");
                line.y = x * 150;
                line.style.top = (x * 150) + "px";
                gameArea.appendChild(line);
           }
		   
		   // add cars enemy lesson9 
		   let enemy =document.createElement("div");
           enemy.innerText= "car 1";
		   enemy.classList.add("enemy");
           enemy.y = 10;
           enemy.style.top =  "10px";
		   enemy.style.left = "-100x";
       	   enemy.style.backgroundColor="red";
           gameArea.appendChild(enemy);  
		   
		      
		   // add cars enemy lesson9
		   let enemy2 =document.createElement("div");
           enemy2.innerText= "car 2";
		   enemy2.classList.add("enemy");
           enemy2.y = 80;
           enemy2.style.top =  "80px";
		   enemy2.style.left = "300px";
       	   enemy2.style.backgroundColor="green";
           gameArea.appendChild(enemy2);  
          
		  
	          for (let x = 0; x < 3; x++) {
                let enemy = document.createElement("div");
                enemy.classList.add("enemy");
                enemy.innerHTML = "<br>" + (x + 1);
                enemy.y = ((x + 1) * 600) * -1;
                enemy.style.top = enemy.y + "px";
                enemy.style.left = Math.floor(Math.random() * 350) + "px";
                enemy.style.backgroundColor = randomColor();
                gameArea.appendChild(enemy);
            } 
		  

          
	  

      
        }
                
		function randomColor() {
            function c() {
                let hex = Math.floor(Math.random() * 256).toString(16);
                return ("0" + String(hex)).substr(-2)
            }
            return "#" + c() + c() + c();
        }
		
        function pressOn(e){
        	e.preventDefault();
            keys[e.key] = true;
            console.log(keys);   
    
        }
        
        function pressOff(e){
        	e.preventDefault();
            keys[e.key] = false;
           
    
        }
        
        
        
    </script>
</body>

</html>
