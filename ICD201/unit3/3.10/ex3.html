<script>
//Equals ==
document.write("<br>" + (10 == 5)); // -> false
document.write("<br>" + (10 == 10)); // -> true

document.write("<br>" + (10 == "10")); // -> true
document.write("<br>" + ("10" == "10")); // -> true
document.write("<br>" + ("Alice" == "Bob")); // -> false

document.write("<br>" + (0 == false)); // -> true

// Greater or equal to >=
document.write("<br>" + (10 >= 5)); // -> true

// Less than <
document.write("<br>" + (10 < 5)); // -> false	
</script>
